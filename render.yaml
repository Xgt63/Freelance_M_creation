services:
  - type: web
    name: freelance-os
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # Render vous demandera de la saisir
      - key: VITE_ADMIN_PIN
        value: "2026"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false # Render vous demandera de la saisir (ex: Supabase URL)
